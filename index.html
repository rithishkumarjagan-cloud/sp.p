<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .box {
            background: white;
            max-width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
        }
        button {
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>➕ Calculator</h1>
        <input type="number" id="num1" placeholder="Enter number 1">
        <input type="number" id="num2" placeholder="Enter number 2">
        <br>
        <button onclick="addNumbers()">Add ➕</button>
        <div id="result"></div>
    </div>

    <script>
        async function addNumbers() {
            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;
            
            let response = await fetch('/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `number1=${num1}&number2=${num2}`
            });
            
            let data = await response.json();
            document.getElementById('result').innerHTML = "Answer: " + data.answer;
        }
    </script>
</body>
</html>
